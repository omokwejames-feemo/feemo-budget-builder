name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml

  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}

      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-artifacts
          path: |
            release/*.exe
            release/latest.yml

  release:
    name: Publish Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-artifacts
          path: ./artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-artifacts
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Feemo Budget Manager v${{ steps.version.outputs.version }}
          files: ./artifacts/*
          make_latest: true
          body: |
            ## What's new in v${{ steps.version.outputs.version }}

            **Beta Security System**
            - Full key-based access gate — 20 unique FEEMO-XXXX-XXXX keys, each bound to a single email address
            - Email verification via 6-digit one-time code on first use (expires in 10 minutes)
            - Keys activate on first use with a 5-day access window
            - Verified session stored locally — no re-entry required on subsequent launches
            - Master key for internal use bypasses email verification entirely

            **Upload Existing Budget**
            - New "Upload Existing Budget" entry point on the home screen
            - Reads any Excel budget and auto-detects: title, company, total budget, currency, shoot days, department allocations, timeline phases, VAT/WHT/contingency/production fee percentages
            - Confirmation screen lets you review and correct every detected value before committing
            - Missing data dialog lists all undetected fields with inline inputs and per-field Skip option

            ---
            **Mac:** download the `.dmg` — open it and drag to Applications.
            **Windows:** download the `.exe` and run the installer.
