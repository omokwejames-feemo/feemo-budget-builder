name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_PUBLISH: never

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg

  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          ELECTRON_BUILDER_PUBLISH: never

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: release/*.exe

  release:
    name: Publish Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: ./artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-exe
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Feemo Budget Builder v${{ steps.version.outputs.version }}
          files: ./artifacts/*
          make_latest: true
          allow_updates: true
          body: |
            ## Feemo Budget Builder v${{ steps.version.outputs.version }}

            Download the installer for your platform:

            - **Mac** → download the `.dmg` file, open it, drag the app to Applications
            - **Windows** → download the `.exe` file and run the installer
