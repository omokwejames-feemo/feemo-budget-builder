name: Build Installers

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: Feemo-Budget-Builder-Mac
          path: release/*.dmg
          if-no-files-found: warn

  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Feemo-Budget-Builder-Windows
          path: release/*.exe
          if-no-files-found: warn
